- name: Create IPA (TrollStore Friendly)
  run: |
    set -euo pipefail
    # 定义路径
    BUILD_DIR="ios/build/Build/Products/Release-iphoneos"
    IPA_NAME="MusicFree_${{ steps.build-version.outputs.raw }}.ipa"

    # 1. 先找到编译生成的 .app 文件（兼容不同项目名）
    APP_FILE=$(find "${BUILD_DIR}" -maxdepth 1 -name "*.app" | head -n 1)
    if [[ -z "${APP_FILE}" ]]; then
      echo "❌ 错误：未找到编译生成的 .app 文件！"
      ls -la "${BUILD_DIR}"
      exit 1
    fi
    echo "✅ 找到APP文件: ${APP_FILE}"

    # 2. 正确创建 Payload 文件夹，并把 .app 复制进去
    rm -rf "${BUILD_DIR}/Payload"  # 清理旧文件夹
    mkdir -p "${BUILD_DIR}/Payload"
    cp -R "${APP_FILE}" "${BUILD_DIR}/Payload/"

    # 3. 验证 Info.plist 存在
    PLIST_PATH="${BUILD_DIR}/Payload/$(basename "${APP_FILE}")/Info.plist"
    if [[ ! -f "${PLIST_PATH}" ]]; then
      echo "❌ 错误：Info.plist 不存在！"
      ls -la "${BUILD_DIR}/Payload/"
      exit 1
    fi
    echo "✅ 验证Info.plist成功: ${PLIST_PATH}"

    # 4. 修复巨魔签名（可选，增强兼容性）
    /usr/libexec/PlistBuddy -c "Delete :SigningCertificate" "${PLIST_PATH}" 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Delete :SigningIdentity" "${PLIST_PATH}" 2>/dev/null || true

    # 5. 打包生成IPA
    cd "${BUILD_DIR}"
    zip -r "${IPA_NAME}" Payload/

    # 6. 验证IPA生成成功
    if [[ ! -f "${IPA_NAME}" ]]; then
      echo "❌ 错误：IPA生成失败！"
      ls -la
      exit 1
    fi
    echo "✅ IPA生成成功: ${IPA_NAME}"
    ls -la "${IPA_NAME}"
