name: Build iOS IPA (TrollStore 直装)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.6.48)'
        required: true
        default: 'v0.6.48'
        type: string

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15
    env:
      RCT_NEW_ARCH_ENABLED: '0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Resolve build version
        id: build-version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${RAW_VERSION#v}"
          echo "raw=${RAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V | tail -n 1)
          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version
          pod --version

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile', 'ios/Podfile.properties.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --prefer-offline --no-audit --progress=false

      - name: Sync build version
        run: |
          VERSION="${{ steps.build-version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo = app.expo || {};
            app.expo.version = '${VERSION}';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - name: Generate build info
        run: npm run generate-build-info

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (No Codesign)
        run: |
          cd ios
          xcodebuild -workspace MusicFree.xcworkspace \
            -scheme MusicFreeNew \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${{ steps.build-version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.build-version.outputs.build_number }}"

      - name: Create IPA (TrollStore 100% 兼容)
        run: |
          set -euo pipefail
          BUILD_DIR="ios/build/Build/Products/Release-iphoneos"
          IPA_NAME="MusicFree_${{ steps.build-version.outputs.raw }}.ipa"
          
          APP=$(find "$BUILD_DIR" -name "*.app" | head -n1)
          echo "Found app: $APP"
          
          mkdir -p "$BUILD_DIR/Payload"
          cp -r "$APP" "$BUILD_DIR/Payload/"
          
          cd "$BUILD_DIR"
          zip -r "$IPA_NAME" Payload/
          ls -la *.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicFree-iOS-TrollStore
          path: ios/build/Build/Products/Release-iphoneos/*.ipa
          retention-days: 90

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/gh-release-uploader@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          file_paths: ios/build/Build/Products/Release-iphoneos/*.ipa
